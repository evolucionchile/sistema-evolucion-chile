        // --- CAPITALIZACIÓN Y NOMBRE COMPLETO ---
        function formatProperCase(text) {
            return text.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        }

        function actualizarNombre() {
            const p_nom = formatProperCase(document.getElementById('p_nom').value);
            const s_nom = formatProperCase(document.getElementById('s_nom').value);
            const p_ape = formatProperCase(document.getElementById('p_ape').value);
            const s_ape = formatProperCase(document.getElementById('s_ape').value);
            
            document.getElementById('p_nom').value = p_nom;
            document.getElementById('s_nom').value = s_nom;
            document.getElementById('p_ape').value = p_ape;
            document.getElementById('s_ape').value = s_ape;

            const completo = `${p_nom} ${s_nom} ${p_ape} ${s_ape}`.trim().replace(/\s+/g, ' ');
            document.getElementById('nom_completo').value = completo;
        }

        document.querySelectorAll('#p_nom, #s_nom, #p_ape, #s_ape').forEach(i => {
            i.addEventListener('blur', actualizarNombre);
        });

        document.querySelectorAll('input[type="text"]').forEach(input => {
            if (!input.readOnly && !['numDoc', 'numDocApo'].includes(input.id)) {
                input.addEventListener('blur', function() {
                    this.value = formatProperCase(this.value);
                });
            }
        });

        // --- VALIDACIÓN DE RUT CHILENO ---
        function validarRutChileno(rutCompleto) {
            let valor = rutCompleto.replace(/\./g, '').replace(/-/g, '');
            if (valor.length < 8) return false;
            let cuerpo = valor.slice(0, -1);
            let dv = valor.slice(-1).toUpperCase();
            let suma = 0; let multiplo = 2;
            for (let i = 1; i <= cuerpo.length; i++) {
                suma = suma + (multiplo * valor.charAt(cuerpo.length - i));
                if (multiplo < 7) multiplo = multiplo + 1; else multiplo = 2;
            }
            let dvEsperado = 11 - (suma % 11);
            dvEsperado = (dvEsperado == 11) ? 0 : ((dvEsperado == 10) ? 'K' : dvEsperado);
            return dv == dvEsperado;
        }

        function aplicarValidacionRUT(idInput, idTipo) {
            const input = document.getElementById(idInput);
            input.addEventListener('blur', function() {
                if (document.getElementById(idTipo).value === "RUT" && this.value !== "") {
                    let v = this.value.replace(/\./g, '').replace(/-/g, '').toUpperCase();
                    if (v.length >= 8) {
                        let cuerpo = v.slice(0, -1); let dv = v.slice(-1);
                        this.value = cuerpo + '-' + dv;
                        if (!validarRutChileno(this.value)) {
                            alert("RUT Inválido. Por favor verifique.");
                            this.classList.add('is-invalid');
                            this.value = "";
                        } else {
                            this.classList.remove('is-invalid');
                        }
                    }
                }
            });
        }

// VALIDACIÓN DE RUT DUPLICADO AL SALIR DE LA CASILLA
document.getElementById('numDoc').addEventListener('blur', async function() {
    // Esperamos un milisegundo para que actúe tu función que pone el guion (-) automáticamente
    setTimeout(async () => {
        let rut = this.value.trim().toUpperCase();
        if (rut.length < 8) return; // Si está incompleto, no hace nada

        try {
            // Llamamos a la ruta de Python que acabamos de crear
            const respuesta = await fetch(`/verificar_rut/${rut}`);
            const resultado = await respuesta.json();

            if (resultado.existe) {
                // Alerta bonita e inmediata
                // Verifica que la llamada a Swal.fire tenga esta estructura limpia:
                Swal.fire({
                    title: 'RUT DUPLICADO',
                    text: `El RUT ${rut} ya está registrado en el sistema. Por favor, verifícalo o modificalo en la Pestaña Modificar Paciente.`,
                    icon: 'warning',
                    confirmButtonColor: '#3182ce',
                    confirmButtonText: 'CORREGIR'
                });
                // Limpiamos la casilla para obligar al usuario a corregirlo
                this.value = "";
            }
        } catch (error) {
            console.error("Error al verificar el RUT:", error);
        }
    }, 100);
});

    // 1. Frenamos el envío automático del formulario
    evento.preventDefault(); 
    
    // 2. Lanzamos la ventana de confirmación Sí/No
    Swal.fire({
        title: '¿DESEA AGREGAR AL PACIENTE?',
        text: "Asegúrate de que todos los datos ingresados sean correctos.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3182ce',
        cancelButtonColor: '#718096',
        confirmButtonText: 'SÍ, GUARDAR',
        cancelButtonText: 'NO, REVISAR'
    }).then((resultado) => {
        // 3. Si el usuario hace clic en "SÍ, GUARDAR"
        if (resultado.isConfirmed) {
            // Mostramos el mensaje de éxito inmediato
            Swal.fire({
                title: '¡PACIENTE AGREGADO CORRECTAMENTE!',
                icon: 'success',
                confirmButtonColor: '#3182ce',
                confirmButtonText: 'OK'
            }).then(() => {
                // Enviamos el formulario físicamente para que Python procese el registro
                document.getElementById('formIngreso').submit();
            });
        }
        // Si el usuario hace clic en "NO", el código no hace nada, 
        // manteniendo el formulario intacto con toda la información escrita.
    });
});

    </script>
</body>
</html>
